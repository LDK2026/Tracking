          cat > app/src/main/java/com/example/tracker/LocationService.java <<'EOF'
          package com.example.tracker;

          import android.Manifest;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.location.Location;
          import android.location.LocationListener;
          import android.location.LocationManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.IBinder;

          public class LocationService extends Service implements LocationListener {
              public static final String ACTION_LOCATION = "com.example.tracker.LOCATION";
              public static final String EXTRA_LAT = "lat";
              public static final String EXTRA_LNG = "lng";
              public static final String EXTRA_ACCURACY = "accuracy";
              public static final String EXTRA_MODE = "mode";
              public static final String EXTRA_RELOAD = "reload";
              private static final String CHANNEL_ID = "tracking";
              private static final float MAX_ACCURACY_METERS = 25f;
              private static final float MIN_DISTANCE_METERS = 25f;
              private static final long MIN_TIME_MS = 8000L;
              private static final float GLITCH_SPEED_MPS = 95f;
              private static final float FLIGHT_GAP_DISTANCE_METERS = 250000f;
              private static final long FLIGHT_GAP_TIME_MS = 20L * 60L * 1000L;
              private LocationManager locationManager;
              private RouteStore routeStore;
              private Location lastAccepted;
              private int highSpeedStreak;

              @Override
              public void onCreate() {
                  super.onCreate();
                  routeStore = new RouteStore(this);
                  lastAccepted = routeStore.latestLocation();
                  locationManager = (LocationManager) getSystemService(Context.LOCATION_SERVICE);
                  createChannel();
                  startForeground(1, createNotification());
                  TrackingState.setRunning(this, true);
                  startUpdates();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  TrackingState.setRunning(this, true);
                  startUpdates();
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  if (locationManager != null) locationManager.removeUpdates(this);
                  if (routeStore != null) routeStore.close();
                  super.onDestroy();
              }

              @Override public IBinder onBind(Intent intent) { return null; }

              @Override
              public void onLocationChanged(Location location) {
                  String manualMode = TrackingState.getManualMode(this);
                  boolean flightGap = isFlightGap(location, manualMode);
                  if (!shouldAccept(location) && !flightGap) return;
                  String mode = classify(location);
                  boolean reload = false;
                  if (flightGap) {
                      addFlightBridge(lastAccepted, location);
                      reload = true;
                  } else {
                      routeStore.add(
                              location.getLatitude(),
                              location.getLongitude(),
                              location.hasAccuracy() ? location.getAccuracy() : 0f,
                              location.getTime() > 0 ? location.getTime() : System.currentTimeMillis(),
                              location.getProvider(),
                              mode
                      );
                  }
                  lastAccepted = new Location(location);
                  Intent intent = new Intent(ACTION_LOCATION);
                  intent.setPackage(getPackageName());
                  intent.putExtra(EXTRA_LAT, location.getLatitude());
                  intent.putExtra(EXTRA_LNG, location.getLongitude());
                  intent.putExtra(EXTRA_ACCURACY, location.hasAccuracy() ? location.getAccuracy() : 0f);
                  intent.putExtra(EXTRA_MODE, mode);
                  intent.putExtra(EXTRA_RELOAD, reload);
                  sendBroadcast(intent);
              }

              @Override public void onProviderEnabled(String provider) {}
              @Override public void onProviderDisabled(String provider) {}
              @Override public void onStatusChanged(String provider, int status, Bundle extras) {}

              private void startUpdates() {
                  if (locationManager == null || !hasLocationPermission()) {
                      stopSelf();
                      return;
                  }
                  try {
                      locationManager.removeUpdates(this);
                      request(LocationManager.GPS_PROVIDER);
                      request(LocationManager.NETWORK_PROVIDER);
                  } catch (SecurityException error) {
                      stopSelf();
                  }
              }

              private void request(String provider) {
                  try {
                      if (locationManager.isProviderEnabled(provider)) {
                          locationManager.requestLocationUpdates(provider, MIN_TIME_MS, MIN_DISTANCE_METERS, this);
                          Location last = locationManager.getLastKnownLocation(provider);
                          if (last != null) onLocationChanged(last);
                      }
                  } catch (Exception ignored) {
                  }
              }

              private boolean shouldAccept(Location location) {
                  if (location == null) return false;
                  if (location.hasAccuracy() && location.getAccuracy() > MAX_ACCURACY_METERS) return false;
                  if (lastAccepted == null) return true;

                  long dtMs = Math.max(1L, effectiveTime(location) - effectiveTime(lastAccepted));
                  float distance = location.distanceTo(lastAccepted);
                  float combinedAccuracy = (location.hasAccuracy() ? location.getAccuracy() : 25f)
                          + (lastAccepted.hasAccuracy() ? lastAccepted.getAccuracy() : 25f);
                  if (distance < Math.max(MIN_DISTANCE_METERS, combinedAccuracy * 2.5f) && dtMs < 180000L) {
                      return false;
                  }

                  float speed = distance / (dtMs / 1000f);
                  boolean deviceReportsAirSpeed = location.hasSpeed() && location.getSpeed() > 55f;
                  String manualMode = TrackingState.getManualMode(this);
                  if (!MovementMode.AIR.equals(manualMode) && speed > 12f && dtMs < 180000L) {
                      return false;
                  }
                  if (speed > GLITCH_SPEED_MPS && !deviceReportsAirSpeed) {
                      return false;
                  }
                  return true;
              }

              private String classify(Location location) {
                  String manualMode = TrackingState.getManualMode(this);
                  if (MovementMode.AIR.equals(manualMode) || MovementMode.SEA.equals(manualMode)) {
                      return manualMode;
                  }
                  if (lastAccepted == null) return MovementMode.GROUND;
                  long dtMs = Math.max(1L, effectiveTime(location) - effectiveTime(lastAccepted));
                  float distance = location.distanceTo(lastAccepted);
                  float calculatedSpeed = distance / (dtMs / 1000f);
                  float speed = location.hasSpeed() ? Math.max(location.getSpeed(), calculatedSpeed) : calculatedSpeed;

                  if ((speed > 55f && distance > 1200f && dtMs > 12000L) || (location.hasSpeed() && location.getSpeed() > 70f)) {
                      highSpeedStreak++;
                  } else {
                      highSpeedStreak = 0;
                  }
                  if (highSpeedStreak >= 2) return MovementMode.AIR;

                  if (speed >= 1.5f && speed <= 13f && distance > 40f && dtMs > 8000L && !LocationManager.GPS_PROVIDER.equals(location.getProvider())) {
                      return MovementMode.SEA;
                  }
                  return MovementMode.GROUND;
              }

              private boolean isFlightGap(Location location, String manualMode) {
                  if (!MovementMode.AIR.equals(manualMode) || lastAccepted == null || location == null) {
                      return false;
                  }
                  long dtMs = Math.max(1L, effectiveTime(location) - effectiveTime(lastAccepted));
                  float distance = location.distanceTo(lastAccepted);
                  return dtMs >= FLIGHT_GAP_TIME_MS && distance >= FLIGHT_GAP_DISTANCE_METERS;
              }

              private void addFlightBridge(Location from, Location to) {
                  if (from == null || to == null) return;
                  int steps = Math.max(8, Math.min(80, (int) (from.distanceTo(to) / 50000f)));
                  long start = effectiveTime(from);
                  long end = effectiveTime(to);
                  for (int i = 1; i <= steps; i++) {
                      double f = i / (double) steps;
                      double[] point = interpolateGreatCircle(from.getLatitude(), from.getLongitude(), to.getLatitude(), to.getLongitude(), f);
                      long time = start + (long) ((end - start) * f);
                      routeStore.add(point[0], point[1], to.hasAccuracy() ? to.getAccuracy() : 0f, time, "flight-bridge", MovementMode.AIR);
                  }
              }

              private double[] interpolateGreatCircle(double lat1, double lng1, double lat2, double lng2, double fraction) {
                  double phi1 = Math.toRadians(lat1);
                  double lambda1 = Math.toRadians(lng1);
                  double phi2 = Math.toRadians(lat2);
                  double lambda2 = Math.toRadians(lng2);
                  double d = 2 * Math.asin(Math.sqrt(
                          Math.pow(Math.sin((phi2 - phi1) / 2), 2)
                                  + Math.cos(phi1) * Math.cos(phi2) * Math.pow(Math.sin((lambda2 - lambda1) / 2), 2)));
                  if (d == 0) return new double[]{lat1, lng1};
                  double a = Math.sin((1 - fraction) * d) / Math.sin(d);
                  double b = Math.sin(fraction * d) / Math.sin(d);
                  double x = a * Math.cos(phi1) * Math.cos(lambda1) + b * Math.cos(phi2) * Math.cos(lambda2);
                  double y = a * Math.cos(phi1) * Math.sin(lambda1) + b * Math.cos(phi2) * Math.sin(lambda2);
                  double z = a * Math.sin(phi1) + b * Math.sin(phi2);
                  double phi = Math.atan2(z, Math.sqrt(x * x + y * y));
                  double lambda = Math.atan2(y, x);
                  return new double[]{Math.toDegrees(phi), Math.toDegrees(lambda)};
              }

              private long effectiveTime(Location location) {
                  return location.getTime() > 0 ? location.getTime() : System.currentTimeMillis();
              }

              private boolean hasLocationPermission() {
                  return checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED
                          || checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  int flags = Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0;
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, flags);
                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new Notification.Builder(this, CHANNEL_ID)
                          : new Notification.Builder(this);
                  return builder
                          .setContentTitle("Tracker veikia")
                          .setContentText("Programa nuolat saugo marsruta.")
                          .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                          .setContentIntent(pendingIntent)
                          .setOngoing(true)
                          .build();
              }

              private void createChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                              CHANNEL_ID,
                              "Tracker",
                              NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }
          }
