name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Generate complete Android project
        shell: bash
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/example/tracker app/src/main/res/values app/src/main/res/drawable

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "TrackerApp"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id "com.android.application" }

          android {
              namespace "com.example.tracker"
              compileSdk 35
              defaultConfig {
                  applicationId "com.example.tracker"
                  minSdk 24
                  targetSdk 34
                  versionCode 15
                  versionName "3.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation "org.maplibre.gl:android-sdk:13.1.0"
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:navigationBarColor">#ffffff</item>
                  <item name="android:colorAccent">#6d1230</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#6d1230" android:pathData="M0,0 L108,0 L108,108 L0,108 Z" />
              <path android:fillColor="#f8fafc" android:pathData="M14,14 L94,14 L94,94 L14,94 Z" />
              <path android:fillColor="#16a34a" android:pathData="M22,22 L86,22 L86,86 L22,86 Z" />
              <path android:fillColor="#2563eb" android:pathData="M22,66 L39,54 L53,60 L72,45 L88,52 L88,86 L22,86 Z" />
              <path android:fillColor="#facc15" android:pathData="M73,20 L83,30 L64,44 L75,66 L66,74 L51,54 L34,65 L27,58 L43,43 L31,27 L39,20 L57,34 Z" />
              <path android:fillColor="#6d1230" android:pathData="M48,45 L60,45 L60,57 L48,57 Z" />
          </vector>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher"
                  android:label="Tracker"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".LocationService"
                      android:exported="false"
                      android:foregroundServiceType="location" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/example/tracker/MovementMode.java <<'EOF'
          package com.example.tracker;

          final class MovementMode {
              static final String AIR = "air";
              static final String SEA = "sea";
              static final String GROUND = "ground";
              private MovementMode() {}
          }
          EOF

          cat > app/src/main/java/com/example/tracker/TrackingState.java <<'EOF'
          package com.example.tracker;

          import android.content.Context;
          import android.content.SharedPreferences;

          final class TrackingState {
              private static final String PREFS = "tracking_state";
              private static final String RUNNING = "running";
              private static final String MANUAL_MODE = "manual_mode";

              private TrackingState() {}

              static boolean isRunning(Context context) {
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).getBoolean(RUNNING, false);
              }

              static void setRunning(Context context, boolean running) {
                  context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).edit().putBoolean(RUNNING, running).apply();
              }

              static String getManualMode(Context context) {
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).getString(MANUAL_MODE, MovementMode.GROUND);
              }

              static void setManualMode(Context context, String mode) {
                  context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                          .edit()
                          .putString(MANUAL_MODE, mode == null ? MovementMode.GROUND : mode)
                          .apply();
              }
          }
          EOF

          cat > app/src/main/java/com/example/tracker/RouteStore.java <<'EOF'
          package com.example.tracker;

          import android.content.ContentValues;
          import android.content.Context;
          import android.database.Cursor;
          import android.database.sqlite.SQLiteDatabase;
          import android.database.sqlite.SQLiteOpenHelper;
          import android.location.Location;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          final class RouteStore extends SQLiteOpenHelper {
              static final class Point {
                  final double lat;
                  final double lng;
                  final float accuracy;
                  final long time;
                  final String mode;

                  Point(double lat, double lng, float accuracy, long time, String mode) {
                      this.lat = lat;
                      this.lng = lng;
                      this.accuracy = accuracy;
                      this.time = time;
                      this.mode = mode == null ? MovementMode.GROUND : mode;
                  }
              }

              private static final String DB_NAME = "route.db";
              private static final int DB_VERSION = 2;
              private static final String TABLE = "points";

              RouteStore(Context context) {
                  super(context, DB_NAME, null, DB_VERSION);
              }

              @Override
              public void onCreate(SQLiteDatabase db) {
                  db.execSQL("CREATE TABLE " + TABLE + " (" +
                          "id INTEGER PRIMARY KEY AUTOINCREMENT," +
                          "lat REAL NOT NULL," +
                          "lng REAL NOT NULL," +
                          "accuracy REAL NOT NULL," +
                          "time INTEGER NOT NULL," +
                          "provider TEXT," +
                          "mode TEXT NOT NULL DEFAULT 'ground')");
              }

              @Override
              public void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {
                  if (oldVersion < 2) {
                      db.execSQL("ALTER TABLE " + TABLE + " ADD COLUMN mode TEXT NOT NULL DEFAULT 'ground'");
                  }
              }

              synchronized void add(double lat, double lng, float accuracy, long time, String provider, String mode) {
                  ContentValues values = new ContentValues();
                  values.put("lat", lat);
                  values.put("lng", lng);
                  values.put("accuracy", accuracy);
                  values.put("time", time);
                  values.put("provider", provider == null ? "" : provider);
                  values.put("mode", mode == null ? MovementMode.GROUND : mode);
                  getWritableDatabase().insert(TABLE, null, values);
              }

              synchronized List<Point> readAll() {
                  ArrayList<Point> points = new ArrayList<>();
                  Cursor cursor = getReadableDatabase().query(
                          TABLE,
                          new String[]{"lat", "lng", "accuracy", "time", "mode"},
                          null, null, null, null,
                          "time ASC, id ASC"
                  );
                  try {
                      while (cursor.moveToNext()) {
                          points.add(new Point(
                                  cursor.getDouble(0),
                                  cursor.getDouble(1),
                                  cursor.getFloat(2),
                                  cursor.getLong(3),
                                  cursor.getString(4)
                          ));
                      }
                  } finally {
                      cursor.close();
                  }
                  return points;
              }

              synchronized Location latestLocation() {
                  Cursor cursor = getReadableDatabase().query(
                          TABLE,
                          new String[]{"lat", "lng", "accuracy", "time"},
                          null, null, null, null,
                          "time DESC, id DESC",
                          "1"
                  );
                  try {
                      if (!cursor.moveToFirst()) return null;
                      Location location = new Location("db");
                      location.setLatitude(cursor.getDouble(0));
                      location.setLongitude(cursor.getDouble(1));
                      location.setAccuracy(cursor.getFloat(2));
                      location.setTime(cursor.getLong(3));
                      return location;
                  } finally {
                      cursor.close();
                  }
              }

              synchronized String statisticsText() {
                  double total = 0;
                  double air = 0;
                  double sea = 0;
                  double ground = 0;
                  Location previous = null;

                  for (Point point : readAll()) {
                      Location current = new Location("db");
                      current.setLatitude(point.lat);
                      current.setLongitude(point.lng);
                      if (previous != null) {
                          double km = previous.distanceTo(current) / 1000.0;
                          total += km;
                          if (MovementMode.AIR.equals(point.mode)) {
                              air += km;
                          } else if (MovementMode.SEA.equals(point.mode)) {
                              sea += km;
                          } else {
                              ground += km;
                          }
                      }
                      previous = current;
                  }

                  return String.format(Locale.US,
                          "Visas kelias: %.2f km\n\n✈ Lėktuvu: %.2f km\n⛵ Laivu: %.2f km\n🌐 Žeme: %.2f km",
                          total, air, sea, ground);
              }
          }
          EOF

          cat > app/src/main/java/com/example/tracker/MainActivity.java <<'EOF'
          package com.example.tracker;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageManager;
          import android.graphics.Bitmap;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.widget.Button;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.Toast;

          import org.maplibre.android.MapLibre;
          import org.maplibre.android.annotations.Icon;
          import org.maplibre.android.annotations.IconFactory;
          import org.maplibre.android.annotations.Marker;
          import org.maplibre.android.annotations.MarkerOptions;
          import org.maplibre.android.annotations.Polyline;
          import org.maplibre.android.annotations.PolylineOptions;
          import org.maplibre.android.camera.CameraUpdateFactory;
          import org.maplibre.android.geometry.LatLng;
          import org.maplibre.android.geometry.LatLngBounds;
          import org.maplibre.android.maps.MapLibreMap;
          import org.maplibre.android.maps.MapView;
          import org.maplibre.android.maps.Style;

          import java.util.ArrayList;
          import java.util.List;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final int REQUEST_PERMISSIONS = 100;
              private static final String STYLE_JSON = "{"
                      + "\"version\":8,"
                      + "\"sources\":{\"osm\":{\"type\":\"raster\",\"tiles\":[\"https://tile.openstreetmap.org/{z}/{x}/{y}.png\"],\"tileSize\":256,\"attribution\":\"OpenStreetMap\"}},"
                      + "\"layers\":[{\"id\":\"osm\",\"type\":\"raster\",\"source\":\"osm\"}]"
                      + "}";

              private final int burgundy = Color.rgb(109, 18, 48);
              private MapView mapView;
              private MapLibreMap map;
              private RouteStore routeStore;
              private Button trackingButton;
              private Button groundButton;
              private Button airButton;
              private Button seaButton;
              private Marker marker;
              private RouteStore.Point lastUiPoint;
              private final List<Polyline> routeLines = new ArrayList<>();

              private final BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      double lat = intent.getDoubleExtra(LocationService.EXTRA_LAT, Double.NaN);
                      double lng = intent.getDoubleExtra(LocationService.EXTRA_LNG, Double.NaN);
                      float accuracy = intent.getFloatExtra(LocationService.EXTRA_ACCURACY, 0f);
                      String mode = intent.getStringExtra(LocationService.EXTRA_MODE);
                      if (intent.getBooleanExtra(LocationService.EXTRA_RELOAD, false)) {
                          loadSavedRoute(true);
                      } else if (!Double.isNaN(lat) && !Double.isNaN(lng)) {
                          RouteStore.Point point = new RouteStore.Point(lat, lng, accuracy, System.currentTimeMillis(), mode);
                          addPointToMap(point, true, true);
                      }
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  MapLibre.getInstance(this);
                  routeStore = new RouteStore(this);
                  buildUi(savedInstanceState);
                  if (!hasLocationPermission()) {
                      requestNeededPermissions();
                  } else if (TrackingState.isRunning(this)) {
                      startTracking();
                  }
              }

              @Override
              protected void onStart() {
                  super.onStart();
                  mapView.onStart();
                  IntentFilter filter = new IntentFilter(LocationService.ACTION_LOCATION);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(receiver, filter);
                  }
                  refreshButton();
                  refreshModeButtons();
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  mapView.onResume();
              }

              @Override
              protected void onPause() {
                  mapView.onPause();
                  super.onPause();
              }

              @Override
              protected void onStop() {
                  unregisterReceiver(receiver);
                  mapView.onStop();
                  super.onStop();
              }

              @Override
              protected void onDestroy() {
                  mapView.onDestroy();
                  routeStore.close();
                  super.onDestroy();
              }

              @Override
              public void onLowMemory() {
                  super.onLowMemory();
                  mapView.onLowMemory();
              }

              @Override
              protected void onSaveInstanceState(Bundle outState) {
                  super.onSaveInstanceState(outState);
                  mapView.onSaveInstanceState(outState);
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQUEST_PERMISSIONS && hasLocationPermission()) {
                      startTracking();
                  } else {
                      showToast("Suteikite vietos leidimą, kad programa galėtų sekti maršrutą.");
                  }
              }

              private void buildUi(Bundle savedInstanceState) {
                  FrameLayout root = new FrameLayout(this);
                  mapView = new MapView(this);
                  mapView.onCreate(savedInstanceState);
                  root.addView(mapView, new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));

                  LinearLayout panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setPadding(dp(6), dp(6), dp(6), dp(6));
                  panel.setBackgroundColor(Color.argb(222, 255, 255, 255));

                  LinearLayout actions = new LinearLayout(this);
                  actions.setOrientation(LinearLayout.HORIZONTAL);
                  trackingButton = new Button(this);
                  trackingButton.setOnClickListener(v -> {
                      if (TrackingState.isRunning(this)) {
                          stopTracking();
                      } else if (hasLocationPermission()) {
                          startTracking();
                      } else {
                          requestNeededPermissions();
                      }
                  });
                  actions.addView(trackingButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));

                  Button statsButton = new Button(this);
                  statsButton.setText("Statistika");
                  styleButton(statsButton, Color.rgb(250, 204, 21), Color.rgb(17, 24, 39));
                  statsButton.setOnClickListener(v -> showStatistics());
                  actions.addView(statsButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  panel.addView(actions);

                  LinearLayout modes = new LinearLayout(this);
                  modes.setOrientation(LinearLayout.HORIZONTAL);
                  groundButton = modeButton("Žemė", MovementMode.GROUND);
                  airButton = modeButton("Lėktuvas", MovementMode.AIR);
                  seaButton = modeButton("Laivas", MovementMode.SEA);
                  modes.addView(groundButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  modes.addView(airButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  modes.addView(seaButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  panel.addView(modes);

                  FrameLayout.LayoutParams panelParams = new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.WRAP_CONTENT,
                          Gravity.TOP
                  );
                  root.addView(panel, panelParams);

                  LinearLayout mapTools = new LinearLayout(this);
                  mapTools.setOrientation(LinearLayout.VERTICAL);
                  Button locateButton = compactButton("⌖");
                  locateButton.setOnClickListener(v -> centerOnLast());
                  Button fitButton = compactButton("□");
                  fitButton.setOnClickListener(v -> fitRoute());
                  mapTools.addView(locateButton);
                  mapTools.addView(fitButton);
                  FrameLayout.LayoutParams toolParams = new FrameLayout.LayoutParams(
                          dp(54),
                          FrameLayout.LayoutParams.WRAP_CONTENT,
                          Gravity.RIGHT | Gravity.BOTTOM
                  );
                  toolParams.setMargins(0, 0, dp(12), dp(22));
                  root.addView(mapTools, toolParams);

                  setContentView(root);
                  refreshButton();
                  refreshModeButtons();

                  mapView.getMapAsync(mapLibreMap -> {
                      map = mapLibreMap;
                      map.getUiSettings().setCompassEnabled(true);
                      map.getUiSettings().setZoomGesturesEnabled(true);
                      map.getUiSettings().setScrollGesturesEnabled(true);
                      map.getUiSettings().setRotateGesturesEnabled(false);
                      map.getUiSettings().setTiltGesturesEnabled(false);
                      map.setStyle(new Style.Builder().fromJson(STYLE_JSON), style -> loadSavedRoute(true));
                  });
              }

              private Button compactButton(String label) {
                  Button button = new Button(this);
                  button.setText(label);
                  styleButton(button, Color.WHITE, Color.rgb(17, 24, 39));
                  return button;
              }

              private Button modeButton(String label, String mode) {
                  Button button = new Button(this);
                  button.setText(label);
                  button.setOnClickListener(v -> {
                      TrackingState.setManualMode(this, mode);
                      refreshModeButtons();
                      updateMarkerMode();
                      showToast("Pasirinktas režimas: " + readableMode(mode));
                  });
                  return button;
              }

              private void loadSavedRoute(boolean fit) {
                  if (map == null) return;
                  for (Polyline line : routeLines) {
                      map.removePolyline(line);
                  }
                  routeLines.clear();
                  if (marker != null) {
                      map.removeMarker(marker);
                      marker = null;
                  }
                  lastUiPoint = null;
                  for (RouteStore.Point point : routeStore.readAll()) {
                      addPointToMap(point, false, false);
                  }
                  if (fit) {
                      fitRoute();
                  }
              }

              private void addPointToMap(RouteStore.Point point, boolean moveCamera, boolean showMarker) {
                  if (map == null || point == null) return;
                  if (lastUiPoint != null) {
                      PolylineOptions options = new PolylineOptions()
                              .add(new LatLng(lastUiPoint.lat, lastUiPoint.lng))
                              .add(new LatLng(point.lat, point.lng))
                              .color(colorForMode(point.mode))
                              .width(5f);
                      routeLines.add(map.addPolyline(options));
                  }
                  lastUiPoint = point;
                  if (marker != null) {
                      map.removeMarker(marker);
                  }
                  marker = map.addMarker(new MarkerOptions()
                          .position(new LatLng(point.lat, point.lng))
                          .icon(iconForMode(TrackingState.getManualMode(this))));
                  if (moveCamera || showMarker) {
                      map.animateCamera(CameraUpdateFactory.newLatLngZoom(new LatLng(point.lat, point.lng), Math.max(map.getCameraPosition().zoom, 15.0)));
                  }
              }

              private void centerOnLast() {
                  if (map == null || lastUiPoint == null) {
                      showToast("Dar nėra GPS vietos.");
                      return;
                  }
                  map.animateCamera(CameraUpdateFactory.newLatLngZoom(new LatLng(lastUiPoint.lat, lastUiPoint.lng), 16.0));
              }

              private void fitRoute() {
                  if (map == null) return;
                  List<RouteStore.Point> points = routeStore.readAll();
                  if (points.isEmpty()) return;
                  if (points.size() == 1) {
                      RouteStore.Point point = points.get(0);
                      map.animateCamera(CameraUpdateFactory.newLatLngZoom(new LatLng(point.lat, point.lng), 16.0));
                      return;
                  }
                  LatLngBounds.Builder builder = new LatLngBounds.Builder();
                  for (RouteStore.Point point : points) {
                      builder.include(new LatLng(point.lat, point.lng));
                  }
                  map.animateCamera(CameraUpdateFactory.newLatLngBounds(builder.build(), dp(70)));
              }

              private void startTracking() {
                  try {
                      TrackingState.setRunning(this, true);
                      Intent intent = new Intent(this, LocationService.class);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(intent);
                      } else {
                          startService(intent);
                      }
                      showToast("Sekimas įjungtas.");
                  } catch (Exception error) {
                      TrackingState.setRunning(this, false);
                      showToast("Nepavyko paleisti sekimo: " + error.getClass().getSimpleName());
                  }
                  refreshButton();
              }

              private void stopTracking() {
                  TrackingState.setRunning(this, false);
                  stopService(new Intent(this, LocationService.class));
                  showToast("Sekimas sustabdytas.");
                  refreshButton();
              }

              private void refreshButton() {
                  boolean running = TrackingState.isRunning(this);
                  if (trackingButton == null) return;
                  trackingButton.setText(running ? "Stabdyti sekimą" : "Pradėti sekimą");
                  styleButton(trackingButton, running ? Color.rgb(220, 38, 38) : Color.rgb(22, 163, 74), Color.WHITE);
              }

              private void refreshModeButtons() {
                  String mode = TrackingState.getManualMode(this);
                  styleModeButton(groundButton, MovementMode.GROUND.equals(mode), Color.rgb(22, 163, 74));
                  styleModeButton(airButton, MovementMode.AIR.equals(mode), Color.rgb(250, 204, 21));
                  styleModeButton(seaButton, MovementMode.SEA.equals(mode), Color.rgb(37, 99, 235));
              }

              private void styleModeButton(Button button, boolean selected, int color) {
                  if (button == null) return;
                  int fill = selected ? color : Color.rgb(245, 245, 245);
                  int text = selected && color != Color.rgb(250, 204, 21) ? Color.WHITE : Color.rgb(17, 24, 39);
                  styleButton(button, fill, text);
              }

              private void styleButton(Button button, int fillColor, int textColor) {
                  GradientDrawable background = new GradientDrawable();
                  background.setShape(GradientDrawable.RECTANGLE);
                  background.setColor(fillColor);
                  background.setCornerRadius(dp(14));
                  background.setStroke(dp(2), burgundy);
                  button.setBackground(background);
                  button.setTextColor(textColor);
                  button.setTypeface(Typeface.DEFAULT_BOLD);
                  button.setAllCaps(false);
                  button.setPadding(dp(8), dp(7), dp(8), dp(7));
              }

              private void updateMarkerMode() {
                  if (map == null || marker == null || lastUiPoint == null) return;
                  map.removeMarker(marker);
                  marker = map.addMarker(new MarkerOptions()
                          .position(new LatLng(lastUiPoint.lat, lastUiPoint.lng))
                          .icon(iconForMode(TrackingState.getManualMode(this))));
              }

              private Icon iconForMode(String mode) {
                  String label = "🌐";
                  int fill = Color.WHITE;
                  if (MovementMode.AIR.equals(mode)) {
                      label = "✈";
                      fill = Color.rgb(250, 204, 21);
                  } else if (MovementMode.SEA.equals(mode)) {
                      label = "⛵";
                      fill = Color.rgb(37, 99, 235);
                  }
                  Bitmap bitmap = Bitmap.createBitmap(dp(42), dp(42), Bitmap.Config.ARGB_8888);
                  Canvas canvas = new Canvas(bitmap);
                  Paint paint = new Paint(Paint.ANTI_ALIAS_FLAG);
                  paint.setColor(fill);
                  canvas.drawCircle(dp(21), dp(21), dp(18), paint);
                  paint.setStyle(Paint.Style.STROKE);
                  paint.setStrokeWidth(dp(2));
                  paint.setColor(Color.rgb(17, 24, 39));
                  canvas.drawCircle(dp(21), dp(21), dp(18), paint);
                  paint.setStyle(Paint.Style.FILL);
                  paint.setTextAlign(Paint.Align.CENTER);
                  paint.setTextSize(dp(20));
                  canvas.drawText(label, dp(21), dp(28), paint);
                  return IconFactory.getInstance(this).fromBitmap(bitmap);
              }

              private int colorForMode(String mode) {
                  if (MovementMode.AIR.equals(mode)) return Color.rgb(250, 204, 21);
                  if (MovementMode.SEA.equals(mode)) return Color.rgb(37, 99, 235);
                  return Color.rgb(22, 163, 74);
              }

              private void showStatistics() {
                  new AlertDialog.Builder(this)
                          .setTitle("Statistika")
                          .setMessage(routeStore.statisticsText())
                          .setPositiveButton("Gerai", null)
                          .show();
              }

              private String readableMode(String mode) {
                  if (MovementMode.AIR.equals(mode)) return "lėktuvu";
                  if (MovementMode.SEA.equals(mode)) return "laivu";
                  return "žeme";
              }

              private void requestNeededPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      requestPermissions(new String[]{
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION,
                              Manifest.permission.POST_NOTIFICATIONS
                      }, REQUEST_PERMISSIONS);
                  } else {
                      requestPermissions(new String[]{
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION
                      }, REQUEST_PERMISSIONS);
                  }
              }

              private boolean hasLocationPermission() {
                  return checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED
                          || checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;
              }

              private void showToast(String message) {
                  Toast.makeText(this, message, Toast.LENGTH_SHORT).show();
              }

              private int dp(int value) {
                  return (int) (value * getResources().getDisplayMetrics().density + 0.5f);
              }
          }
