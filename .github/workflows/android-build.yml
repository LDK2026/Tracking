name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Generate complete Android project
        shell: bash
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/example/tracker app/src/main/assets app/src/main/res/values app/src/main/res/drawable app/src/main/res/mipmap-anydpi-v26

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "TrackerApp"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id "com.android.application" }

          android {
              namespace "com.example.tracker"
              compileSdk 35
              defaultConfig {
                  applicationId "com.example.tracker"
                  minSdk 24
                  targetSdk 34
                  versionCode 10
                  versionName "1.9"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#0f766e</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:navigationBarColor">#ffffff</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="Tracker"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:icon="@drawable/ic_launcher"
                  android:roundIcon="@drawable/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".LocationService"
                      android:exported="false"
                      android:foregroundServiceType="location" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#6d1230"
                  android:pathData="M0,0 L108,0 L108,108 L0,108 Z" />
