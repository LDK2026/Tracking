          cat > app/src/main/assets/map.html <<'EOF'
          <!doctype html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
              <style>
                  html, body, #map { height: 100%; margin: 0; }
                  body { font-family: system-ui, sans-serif; }
                  #empty {
                      align-items: center; background: #f8fafc; color: #334155;
                      display: flex; inset: 0; justify-content: center; padding: 24px;
                      position: absolute; text-align: center; z-index: 500;
                  }
                  .mode-icon {
                      background: #fff; border: 2px solid #111827; border-radius: 50%;
                      box-shadow: 0 1px 6px rgba(0,0,0,.25); font-size: 18px;
                      height: 30px; line-height: 28px; text-align: center; width: 30px;
                  }
              </style>
          </head>
          <body>
          <div id="map"></div>
          <div id="empty">Laukiama GPS vietos...</div>
          <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
          <script>
              const colors = { air: "#facc15", sea: "#2563eb", ground: "#16a34a" };
              const labels = { air: "✈", sea: "⛵", ground: "🌐" };
              const map = L.map("map").setView([54.6872, 25.2797], 12);
              L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                  maxZoom: 19,
                  attribution: "OpenStreetMap"
              }).addTo(map);

              let points = [];
              let currentMode = "ground";
              const layers = L.layerGroup().addTo(map);

              function valid(item) {
                  return item && Number.isFinite(Number(item.lat)) && Number.isFinite(Number(item.lng));
              }

              function iconFor(mode) {
                  return L.divIcon({
                      className: "mode-icon",
                      html: labels[mode] || labels.ground,
                      iconSize: [30, 30],
                      iconAnchor: [15, 15]
                  });
              }

              function draw(fit) {
                  layers.clearLayers();
                  if (!points.length) return;
                  document.getElementById("empty").style.display = "none";
                  for (let i = 1; i < points.length; i++) {
                      const previous = points[i - 1];
                      const current = points[i];
                      const mode = current.mode || "ground";
                      L.polyline(
                          [[previous.lat, previous.lng], [current.lat, current.lng]],
                          { color: colors[mode] || colors.ground, weight: 5, opacity: 0.9 }
                      ).addTo(layers);
                  }
                  const last = points[points.length - 1];
                  L.marker([last.lat, last.lng], { icon: iconFor(currentMode || last.mode || "ground") }).addTo(layers);
                  const latLngs = points.map(p => [p.lat, p.lng]);
                  if (fit && latLngs.length > 1) {
                      map.fitBounds(L.latLngBounds(latLngs), { padding: [32, 32], maxZoom: 17 });
                  } else {
                      map.setView([last.lat, last.lng], Math.max(map.getZoom(), 16));
                  }
              }

              window.setLocations = function(items) {
                  points = (items || []).filter(valid).map(item => ({
                      lat: Number(item.lat),
                      lng: Number(item.lng),
                      mode: item.mode || "ground"
                  }));
                  draw(true);
              };

              window.addLocation = function(lat, lng, accuracy, mode) {
                  lat = Number(lat); lng = Number(lng);
                  if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
                  points.push({ lat, lng, mode: mode || "ground" });
                  draw(false);
              };

              window.setCurrentMode = function(mode) {
                  currentMode = mode || "ground";
                  draw(false);
              };
          </script>
          </body>
          </html>
          EOF

          cat > app/src/main/java/com/example/tracker/TrackingState.java <<'EOF'
          package com.example.tracker;

          import android.content.Context;
          import android.content.SharedPreferences;

          final class TrackingState {
              private static final String PREFS = "tracking_state";
              private static final String RUNNING = "running";
              private static final String MANUAL_MODE = "manual_mode";
              private TrackingState() {}
              static boolean isRunning(Context context) {
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).getBoolean(RUNNING, false);
              }
              static void setRunning(Context context, boolean running) {
                  SharedPreferences.Editor editor = context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).edit();
                  editor.putBoolean(RUNNING, running);
                  editor.apply();
              }
              static String getManualMode(Context context) {
                  return context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).getString(MANUAL_MODE, MovementMode.GROUND);
              }
              static void setManualMode(Context context, String mode) {
                  SharedPreferences.Editor editor = context.getSharedPreferences(PREFS, Context.MODE_PRIVATE).edit();
                  editor.putString(MANUAL_MODE, mode == null ? MovementMode.GROUND : mode);
                  editor.apply();
              }
          }
          EOF

          cat > app/src/main/java/com/example/tracker/MovementMode.java <<'EOF'
          package com.example.tracker;

          final class MovementMode {
              static final String AIR = "air";
              static final String SEA = "sea";
              static final String GROUND = "ground";
              private MovementMode() {}
          }
          EOF

          cat > app/src/main/java/com/example/tracker/RouteStore.java <<'EOF'
          package com.example.tracker;

          import android.content.ContentValues;
          import android.content.Context;
          import android.database.Cursor;
          import android.database.sqlite.SQLiteDatabase;
          import android.database.sqlite.SQLiteOpenHelper;
          import android.location.Location;

          import org.json.JSONArray;
          import org.json.JSONObject;

          import java.util.Locale;

          final class RouteStore extends SQLiteOpenHelper {
              private static final String DB_NAME = "route.db";
              private static final int DB_VERSION = 2;
              private static final String TABLE = "points";

              RouteStore(Context context) {
                  super(context, DB_NAME, null, DB_VERSION);
              }

              @Override
              public void onCreate(SQLiteDatabase db) {
                  db.execSQL("CREATE TABLE " + TABLE + " (" +
                          "id INTEGER PRIMARY KEY AUTOINCREMENT," +
                          "lat REAL NOT NULL," +
                          "lng REAL NOT NULL," +
                          "accuracy REAL NOT NULL," +
                          "time INTEGER NOT NULL," +
                          "provider TEXT," +
                          "mode TEXT NOT NULL DEFAULT 'ground')");
              }

              @Override
              public void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion) {
                  if (oldVersion < 2) {
                      db.execSQL("ALTER TABLE " + TABLE + " ADD COLUMN mode TEXT NOT NULL DEFAULT 'ground'");
                  }
              }

              synchronized void add(double lat, double lng, float accuracy, long time, String provider, String mode) {
                  ContentValues values = new ContentValues();
                  values.put("lat", lat);
                  values.put("lng", lng);
                  values.put("accuracy", accuracy);
                  values.put("time", time);
                  values.put("provider", provider == null ? "" : provider);
                  values.put("mode", mode == null ? MovementMode.GROUND : mode);
                  getWritableDatabase().insert(TABLE, null, values);
              }

              synchronized JSONArray readAllJson() {
                  JSONArray array = new JSONArray();
                  Cursor cursor = getReadableDatabase().query(
                          TABLE,
                          new String[]{"lat", "lng", "accuracy", "time", "provider", "mode"},
                          null, null, null, null,
                          "time ASC, id ASC"
                  );
                  try {
                      while (cursor.moveToNext()) {
                          JSONObject item = new JSONObject();
                          item.put("lat", cursor.getDouble(0));
                          item.put("lng", cursor.getDouble(1));
                          item.put("accuracy", cursor.getFloat(2));
                          item.put("time", cursor.getLong(3));
                          item.put("provider", cursor.getString(4));
                          item.put("mode", cursor.getString(5));
                          array.put(item);
                      }
                  } catch (Exception ignored) {
                  } finally {
                      cursor.close();
                  }
                  return array;
              }

              synchronized Cursor latestCursor() {
                  return getReadableDatabase().query(
                          TABLE,
                          new String[]{"lat", "lng", "accuracy", "time", "mode"},
                          null, null, null, null,
                          "time DESC, id DESC",
                          "1"
                  );
              }

              synchronized Location latestLocation() {
                  Cursor cursor = latestCursor();
                  try {
                      if (!cursor.moveToFirst()) {
                          return null;
                      }
                      Location location = new Location("db");
                      location.setLatitude(cursor.getDouble(0));
                      location.setLongitude(cursor.getDouble(1));
                      location.setAccuracy(cursor.getFloat(2));
                      location.setTime(cursor.getLong(3));
                      return location;
                  } finally {
                      cursor.close();
                  }
              }

              synchronized String statisticsText() {
                  double total = 0;
                  double air = 0;
                  double sea = 0;
                  double ground = 0;
                  Location previous = null;
                  String previousMode = MovementMode.GROUND;

                  Cursor cursor = getReadableDatabase().query(
                          TABLE,
                          new String[]{"lat", "lng", "mode"},
                          null, null, null, null,
                          "time ASC, id ASC"
                  );
                  try {
                      while (cursor.moveToNext()) {
                          Location current = new Location("db");
                          current.setLatitude(cursor.getDouble(0));
                          current.setLongitude(cursor.getDouble(1));
                          String mode = cursor.getString(2);
                          if (previous != null) {
                              double km = previous.distanceTo(current) / 1000.0;
                              total += km;
                              if (MovementMode.AIR.equals(mode)) {
                                  air += km;
                              } else if (MovementMode.SEA.equals(mode)) {
                                  sea += km;
                              } else {
                                  ground += km;
                              }
                          }
                          previous = current;
                          previousMode = mode;
                      }
                  } finally {
                      cursor.close();
                  }

                  return String.format(Locale.US,
                          "Visas kelias: %.2f km\n\n✈ Lėktuvu: %.2f km\n⛵ Laivu: %.2f km\n🌐 Žeme: %.2f km",
                          total, air, sea, ground);
              }
          }
          EOF

          cat > app/src/main/java/com/example/tracker/MainActivity.java <<'EOF'
          package com.example.tracker;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageManager;
          import android.database.Cursor;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          import org.json.JSONArray;

          import java.util.Locale;

          public class MainActivity extends Activity {
              private static final int REQUEST_PERMISSIONS = 100;
              private WebView webView;
              private TextView status;
              private Button trackingButton;
              private Button groundButton;
              private Button airButton;
              private Button seaButton;
              private RouteStore routeStore;
              private boolean mapReady;
              private final int burgundy = Color.rgb(109, 18, 48);

              private final BroadcastReceiver receiver = new BroadcastReceiver() {
                  @Override
                  public void onReceive(Context context, Intent intent) {
                      double lat = intent.getDoubleExtra(LocationService.EXTRA_LAT, Double.NaN);
                      double lng = intent.getDoubleExtra(LocationService.EXTRA_LNG, Double.NaN);
                      float accuracy = intent.getFloatExtra(LocationService.EXTRA_ACCURACY, 0f);
                      String mode = intent.getStringExtra(LocationService.EXTRA_MODE);
                      if (intent.getBooleanExtra(LocationService.EXTRA_RELOAD, false)) {
                          loadSavedRoute();
                      } else {
                          showLocation(lat, lng, accuracy, mode);
                      }
                  }
              };

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  routeStore = new RouteStore(this);
                  buildUi();
                  setupMap();
                  refreshButton();
                  refreshModeButtons();
                  if (!hasLocationPermission()) {
                      requestNeededPermissions();
                  } else if (TrackingState.isRunning(this)) {
                      startTracking();
                  }
              }

              @Override
              protected void onStart() {
                  super.onStart();
                  IntentFilter filter = new IntentFilter(LocationService.ACTION_LOCATION);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(receiver, filter);
                  }
                  refreshButton();
                  refreshModeButtons();
              }

              @Override
              protected void onStop() {
                  unregisterReceiver(receiver);
                  super.onStop();
              }

              @Override
              protected void onDestroy() {
                  routeStore.close();
                  super.onDestroy();
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == REQUEST_PERMISSIONS && hasLocationPermission()) {
                      startTracking();
                  } else {
                      status.setText("Suteikite vietos leidimą, kad programa galėtų sekti maršrutą.");
                  }
              }

              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(8), getStatusBarPadding() + dp(6), dp(8), getNavigationBarPadding() + dp(4));

                  status = new TextView(this);
                  status.setText("Tracker parengtas.");
                  status.setTextSize(14);
                  status.setPadding(dp(4), dp(4), dp(4), dp(6));
                  root.addView(status, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                  ));

                  LinearLayout actions = new LinearLayout(this);
                  actions.setOrientation(LinearLayout.HORIZONTAL);

                  trackingButton = new Button(this);
                  trackingButton.setOnClickListener(v -> {
                      if (TrackingState.isRunning(this)) {
                          stopTracking();
                      } else if (hasLocationPermission()) {
                          startTracking();
                      } else {
                          requestNeededPermissions();
                      }
                  });
                  actions.addView(trackingButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));

                  Button statsButton = new Button(this);
                  statsButton.setText("Statistika");
                  styleButton(statsButton, Color.rgb(250, 204, 21), Color.rgb(17, 24, 39));
                  statsButton.setOnClickListener(v -> showStatistics());
                  actions.addView(statsButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  root.addView(actions, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                  ));

                  LinearLayout modes = new LinearLayout(this);
                  modes.setOrientation(LinearLayout.HORIZONTAL);
                  groundButton = modeButton("Žemė", MovementMode.GROUND);
                  airButton = modeButton("Lėktuvas", MovementMode.AIR);
                  seaButton = modeButton("Laivas", MovementMode.SEA);
                  modes.addView(groundButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  modes.addView(airButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  modes.addView(seaButton, new LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                  root.addView(modes, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                  ));

                  webView = new WebView(this);
                  root.addView(webView, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          0,
                          1
                  ));
                  setContentView(root);
              }

              private Button modeButton(String label, String mode) {
                  Button button = new Button(this);
                  button.setText(label);
                  button.setOnClickListener(v -> {
                      TrackingState.setManualMode(this, mode);
                      refreshModeButtons();
                      updateMapMarkerMode(mode);
                      status.setText("Pasirinktas režimas: " + readableMode(mode));
                  });
                  return button;
              }

              private void setupMap() {
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_COMPATIBILITY_MODE);
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          mapReady = true;
                          loadSavedRoute();
                      }
                  });
                  webView.loadUrl("file:///android_asset/map.html");
              }

              private void loadSavedRoute() {
                  JSONArray route = routeStore.readAllJson();
                  webView.evaluateJavascript("window.setLocations(" + route + ")", null);
                  Cursor cursor = routeStore.latestCursor();
                  try {
                      if (cursor.moveToFirst()) {
                          status.setText(String.format(Locale.US,
                                  "Išsaugota vieta: %.6f, %.6f | tikslumas apie %.0f m | %s",
                                  cursor.getDouble(0),
                                  cursor.getDouble(1),
                                  cursor.getFloat(2),
                                  readableMode(cursor.getString(4))));
                      }
                  } finally {
                      cursor.close();
                  }
              }

              private void requestNeededPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      requestPermissions(new String[] {
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION,
                              Manifest.permission.POST_NOTIFICATIONS
                      }, REQUEST_PERMISSIONS);
                  } else {
                      requestPermissions(new String[] {
                              Manifest.permission.ACCESS_FINE_LOCATION,
                              Manifest.permission.ACCESS_COARSE_LOCATION
                      }, REQUEST_PERMISSIONS);
                  }
              }

              private boolean hasLocationPermission() {
                  return checkSelfPermission(Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED
                          || checkSelfPermission(Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;
              }

              private void startTracking() {
                  try {
                      TrackingState.setRunning(this, true);
                      Intent intent = new Intent(this, LocationService.class);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(intent);
                      } else {
                          startService(intent);
                      }
                      status.setText("Sekimas įjungtas. Maršrutas saugomas.");
                  } catch (Exception error) {
                      TrackingState.setRunning(this, false);
                      status.setText("Nepavyko paleisti sekimo: " + error.getClass().getSimpleName());
                  }
                  refreshButton();
              }

              private void stopTracking() {
                  TrackingState.setRunning(this, false);
                  stopService(new Intent(this, LocationService.class));
                  status.setText("Sekimas sustabdytas. Išsaugotas maršrutas lieka žemėlapyje.");
                  refreshButton();
              }

              private void refreshButton() {
                  boolean running = TrackingState.isRunning(this);
                  trackingButton.setText(running ? "Stabdyti sekimą" : "Pradėti sekimą");
                  styleButton(trackingButton, running ? Color.rgb(220, 38, 38) : Color.rgb(22, 163, 74), Color.WHITE);
              }

              private void refreshModeButtons() {
                  String mode = TrackingState.getManualMode(this);
                  styleModeButton(groundButton, MovementMode.GROUND.equals(mode), Color.rgb(22, 163, 74));
                  styleModeButton(airButton, MovementMode.AIR.equals(mode), Color.rgb(250, 204, 21));
                  styleModeButton(seaButton, MovementMode.SEA.equals(mode), Color.rgb(37, 99, 235));
              }

              private void styleModeButton(Button button, boolean selected, int color) {
                  if (button == null) return;
                  int fill = selected ? color : Color.rgb(245, 245, 245);
                  int text = selected && color != Color.rgb(250, 204, 21) ? Color.WHITE : Color.rgb(17, 24, 39);
                  styleButton(button, fill, text);
              }

              private void styleButton(Button button, int fillColor, int textColor) {
                  GradientDrawable background = new GradientDrawable();
                  background.setShape(GradientDrawable.RECTANGLE);
                  background.setColor(fillColor);
                  background.setCornerRadius(dp(14));
                  background.setStroke(dp(2), burgundy);
                  button.setBackground(background);
                  button.setTextColor(textColor);
                  button.setTypeface(Typeface.DEFAULT_BOLD);
                  button.setAllCaps(false);
                  button.setPadding(dp(10), dp(8), dp(10), dp(8));
              }

              private int dp(int value) {
                  return (int) (value * getResources().getDisplayMetrics().density + 0.5f);
              }

              private void updateMapMarkerMode(String mode) {
                  if (mapReady) {
                      String safeMode = mode == null ? MovementMode.GROUND : mode;
                      webView.evaluateJavascript("window.setCurrentMode('" + safeMode + "')", null);
                  }
              }

              private void showLocation(double lat, double lng, float accuracy, String mode) {
                  status.setText(String.format(Locale.US,
                          "Vieta: %.6f, %.6f | tikslumas apie %.0f m | %s",
                          lat, lng, accuracy, readableMode(mode)));
                  if (mapReady) {
                      String js = String.format(Locale.US,
                              "window.addLocation(%f,%f,%f,'%s')",
                              lat, lng, accuracy, mode == null ? MovementMode.GROUND : mode);
                      webView.evaluateJavascript(js, null);
                  }
              }

              private void showStatistics() {
                  new AlertDialog.Builder(this)
                          .setTitle("Statistika")
                          .setMessage(routeStore.statisticsText())
                          .setPositiveButton("Gerai", null)
                          .show();
              }

              private String readableMode(String mode) {
                  if (MovementMode.AIR.equals(mode)) return "lėktuvu";
                  if (MovementMode.SEA.equals(mode)) return "laivu";
                  return "žeme";
              }

              private int getStatusBarPadding() {
                  int id = getResources().getIdentifier("status_bar_height", "dimen", "android");
                  return id > 0 ? getResources().getDimensionPixelSize(id) : 0;
              }

              private int getNavigationBarPadding() {
                  int id = getResources().getIdentifier("navigation_bar_height", "dimen", "android");
                  return id > 0 ? getResources().getDimensionPixelSize(id) : 0;
              }
          }
