name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'TAVO_API_KEY' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Generate complete Android project
        shell: bash
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/example/tracker
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "TrackerApp"
          include ":app"
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
              id "org.jetbrains.kotlin.android" version "2.0.21" apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
          }

          android {
              namespace "com.example.tracker"
              compileSdk 35

              defaultConfig {
                  applicationId "com.example.tracker"
                  minSdk 24
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation "androidx.core:core-ktx:1.15.0"
              implementation "androidx.appcompat:appcompat:1.7.0"
              implementation "com.google.android.gms:play-services-maps:19.0.0"
              implementation "com.google.android.gms:play-services-location:21.3.0"
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Tracker" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#0f766e</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:navigationBarColor">#ffffff</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/layout/activity_maps.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">

              <fragment
                  android:id="@+id/map"
                  android:name="com.google.android.gms.maps.SupportMapFragment"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </FrameLayout>
          EOF

          cat > app/src/main/AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:allowBackup="true"
                  android:label="Tracker"
                  android:theme="@style/Theme.Tracker">

                  <meta-data
                      android:name="com.google.android.geo.API_KEY"
                      android:value="${MAPS_API_KEY}" />

                  <activity
                      android:name=".MapsActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".LocationService"
                      android:exported="false"
                      android:foregroundServiceType="location" />
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/example/tracker/MapsActivity.kt <<'EOF'
          package com.example.tracker

          import android.Manifest
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.content.pm.PackageManager
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import com.google.android.gms.maps.CameraUpdateFactory
          import com.google.android.gms.maps.GoogleMap
          import com.google.android.gms.maps.OnMapReadyCallback
          import com.google.android.gms.maps.SupportMapFragment
          import com.google.android.gms.maps.model.LatLng
          import com.google.android.gms.maps.model.Polyline
          import com.google.android.gms.maps.model.PolylineOptions

          class MapsActivity : AppCompatActivity(), OnMapReadyCallback {
              private var map: GoogleMap? = null
              private var polyline: Polyline? = null
              private val permissionCode = 10

              private val receiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context?, intent: Intent?) {
                      val googleMap = map ?: return
                      val lat = intent?.getDoubleExtra("lat", 0.0) ?: return
                      val lng = intent.getDoubleExtra("lng", 0.0)
                      val point = LatLng(lat, lng)
                      addPoint(googleMap, point)
                      googleMap.animateCamera(CameraUpdateFactory.newLatLngZoom(point, 17f))
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_maps)

                  val mapFragment = supportFragmentManager.findFragmentById(R.id.map) as SupportMapFragment
                  mapFragment.getMapAsync(this)

                  ContextCompat.registerReceiver(
                      this,
                      receiver,
                      IntentFilter(LocationService.ACTION_LOCATION_UPDATE),
                      ContextCompat.RECEIVER_NOT_EXPORTED
                  )

                  requestLocationPermissionIfNeeded()
              }

              override fun onMapReady(googleMap: GoogleMap) {
                  map = googleMap
                  if (hasLocationPermission()) {
                      googleMap.isMyLocationEnabled = true
                      startLocationService()
                  }
              }

              override fun onRequestPermissionsResult(
                  requestCode: Int,
                  permissions: Array<out String>,
                  grantResults: IntArray
              ) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                  if (requestCode == permissionCode && hasLocationPermission()) {
                      map?.isMyLocationEnabled = true
                      startLocationService()
                  }
              }

              override fun onDestroy() {
                  unregisterReceiver(receiver)
                  super.onDestroy()
              }

              private fun addPoint(googleMap: GoogleMap, point: LatLng) {
                  val current = polyline
                  if (current == null) {
                      polyline = googleMap.addPolyline(PolylineOptions().add(point).width(10f))
                  } else {
                      val points = current.points
                      points.add(point)
                      current.points = points
                  }
              }

              private fun startLocationService() {
                  ContextCompat.startForegroundService(this, Intent(this, LocationService::class.java))
              }

              private fun requestLocationPermissionIfNeeded() {
                  if (!hasLocationPermission()) {
                      ActivityCompat.requestPermissions(
                          this,
                          arrayOf(Manifest.permission.ACCESS_FINE_LOCATION),
                          permissionCode
                      )
                  }
              }

              private fun hasLocationPermission(): Boolean {
                  return ContextCompat.checkSelfPermission(
                      this,
                      Manifest.permission.ACCESS_FINE_LOCATION
                  ) == PackageManager.PERMISSION_GRANTED
              }
          }
          EOF

          cat > app/src/main/java/com/example/tracker/LocationService.kt <<'EOF'
          package com.example.tracker

          import android.Manifest
          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.os.Build
          import android.os.IBinder
          import android.os.Looper
          import androidx.core.app.NotificationCompat
          import androidx.core.content.ContextCompat
          import com.google.android.gms.location.FusedLocationProviderClient
          import com.google.android.gms.location.LocationCallback
          import com.google.android.gms.location.LocationRequest
          import com.google.android.gms.location.LocationResult
          import com.google.android.gms.location.LocationServices
          import com.google.android.gms.location.Priority

          class LocationService : Service() {
              companion object {
                  const val ACTION_LOCATION_UPDATE = "com.example.tracker.LOCATION_UPDATE"
              }

              private lateinit var fusedLocationClient: FusedLocationProviderClient
              private lateinit var locationCallback: LocationCallback

              override fun onCreate() {
                  super.onCreate()
                  fusedLocationClient = LocationServices.getFusedLocationProviderClient(this)
                  startForeground(1, createNotification())
                  startLocationUpdates()
              }

              override fun onDestroy() {
                  if (::locationCallback.isInitialized) {
                      fusedLocationClient.removeLocationUpdates(locationCallback)
                  }
                  super.onDestroy()
              }

              override fun onBind(intent: Intent?): IBinder? = null

              private fun createNotification(): Notification {
                  val channelId = "location_channel"
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(channelId, "Tracking", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                  }

                  return NotificationCompat.Builder(this, channelId)
                      .setContentTitle("Sekama vieta")
                      .setContentText("Veikia fone")
                      .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                      .setOngoing(true)
                      .build()
              }

              private fun startLocationUpdates() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION)
                      != PackageManager.PERMISSION_GRANTED
                  ) {
                      stopSelf()
                      return
                  }

                  val request = LocationRequest.Builder(Priority.PRIORITY_HIGH_ACCURACY, 2000).build()

                  locationCallback = object : LocationCallback() {
                      override fun onLocationResult(result: LocationResult) {
                          for (location in result.locations) {
                              sendLocation(location.latitude, location.longitude)
                          }
                      }
                  }

                  fusedLocationClient.requestLocationUpdates(
                      request,
                      locationCallback,
                      Looper.getMainLooper()
                  )
              }

              private fun sendLocation(lat: Double, lng: Double) {
                  val intent = Intent(ACTION_LOCATION_UPDATE)
                  intent.setPackage(packageName)
                  intent.putExtra("lat", lat)
                  intent.putExtra("lng", lng)
                  sendBroadcast(intent)
              }
          }
          EOF

      - name: Build debug APK
        run: gradle clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tracking-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
