                  android:fillColor="#f8fafc"
                  android:pathData="M14,14 L94,14 L94,94 L14,94 Z" />
              <path
                  android:fillColor="#16a34a"
                  android:pathData="M22,22 L86,22 L86,86 L22,86 Z" />
              <path
                  android:fillColor="#2563eb"
                  android:pathData="M22,66 L39,54 L53,60 L72,45 L88,52 L88,86 L22,86 Z" />
              <path
                  android:fillColor="#facc15"
                  android:pathData="M73,20 L83,30 L64,44 L75,66 L66,74 L51,54 L34,65 L27,58 L43,43 L31,27 L39,20 L57,34 Z" />
